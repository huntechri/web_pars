databases:
  - name: petrovich-parser-db
    plan: starter
    region: frankfurt
    databaseName: petrovich
    user: petrovich

services:
  - type: web
    name: petrovich-parser-api
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_DATABASE_URL
        fromDatabase:
          name: petrovich-parser-db
          property: connectionString
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_JWT_ALGORITHM
        value: HS256
      - key: APP_JWT_EXPIRE_MINUTES
        value: "720"
      - key: APP_ADMIN_USERNAME
        value: admin
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_FRONTEND_ORIGIN
        sync: false
      - key: APP_PARSER_COOKIES
        sync: false
      - key: APP_PARSER_HEADERS
        sync: false
      - key: APP_PARSER_MAX_CATEGORY_WORKERS
        value: "3"
      - key: APP_PARSER_RETRY_BASE_DELAY_SECONDS
        value: "0.35"
      - key: APP_PARSER_RATE_LIMIT_WAIT_CAP_SECONDS
        value: "15"
      - key: APP_PARSER_REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: APP_STORAGE_BUCKET
        sync: false
      - key: APP_STORAGE_ENDPOINT_URL
        sync: false
      - key: APP_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: APP_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: APP_STORAGE_REGION
        value: auto
      - key: APP_STORAGE_PRESIGN_EXPIRE_SECONDS
        value: "3600"

  - type: web
    name: petrovich-parser-frontend
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
