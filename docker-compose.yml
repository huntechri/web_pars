version: "3.9"

services:
  db:
    image: postgres:16
    container_name: petrovich_db
    environment:
      POSTGRES_DB: petrovich
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
